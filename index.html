<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MICROJOY V1</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="icon.png">

<style>
    :root {
        --bg-color: #050000;
        --panel-bg: #0d0000;
        --accent: #ff1a1a;
        --accent-dim: #4d0000;
        --danger: #ff0000;
        --text-main: #f5f5f5;
    }

    * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; user-select: none; -webkit-user-select: none; }

    html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100dvh;
        background: radial-gradient(circle at center, #0a0000 0%, #000000 100%);
        color: var(--text-main);
        overflow: hidden;
        touch-action: none;
        display: flex; flex-direction: column;
    }

    /* HEADER */
    .header {
        padding: 12px 15px;
        background: linear-gradient(90deg, #0d0000, #1a0000);
        border-bottom: 1px solid var(--accent);
        display: flex; justify-content: space-between; align-items: center;
    }

    .brand-line {
        font-weight: bold;
        color: var(--accent);
        letter-spacing: 2px;
        text-shadow: 0 0 8px var(--accent);
    }

    #status.connected {
        color: var(--accent);
        text-shadow: 0 0 6px var(--accent);
    }

    .btn-connect {
        background: rgba(255, 0, 0, 0.1);
        color: var(--accent);
        border: 1px solid var(--accent);
        box-shadow: 0 0 10px rgba(255,0,0,0.3);
    }

    .btn-connect:hover {
        background: rgba(255,0,0,0.2);
    }

    /* TELEMETRY */
    .telemetry-hud {
        background: #000;
        border: 1px solid var(--accent);
        color: var(--accent);
        box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }

    /* JOYSTICK */
    .joystick-base {
        background: rgba(20, 0, 0, 0.6);
        border: 2px solid rgba(255, 0, 0, 0.3);
        box-shadow: inset 0 0 20px rgba(255,0,0,0.2);
    }

    .joystick-base.active {
        border-color: var(--accent);
        box-shadow: 0 0 20px rgba(255,0,0,0.5);
    }

    .joystick-base.max-throttle {
        border-color: #ffffff;
        box-shadow: 0 0 25px rgba(255,0,0,0.8);
    }

    .thumbstick {
        background: radial-gradient(circle, #ff1a1a 0%, #800000 100%);
        box-shadow: 0 0 15px rgba(255,0,0,0.7);
    }

    /* D-PAD */
    .dpad-btn {
        background: rgba(40, 0, 0, 0.8);
        border: 2px solid rgba(255, 0, 0, 0.4);
        color: var(--accent);
        box-shadow: 0 0 10px rgba(255,0,0,0.3);
    }

    .dpad-btn.active-toggle {
        background: var(--accent);
        color: #000;
        box-shadow: 0 0 20px var(--accent);
    }

    /* ACTION BUTTON */
    .btn-action {
        background: rgba(40, 0, 0, 0.8);
        border: 2px solid rgba(255, 0, 0, 0.4);
        color: var(--accent);
        box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }

    .btn-action.active-toggle {
        background: var(--accent);
        color: #000;
        box-shadow: 0 0 30px var(--accent);
    }

    /* ICON BUTTON */
    .btn-icon {
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid var(--accent);
        color: var(--accent);
        box-shadow: 0 0 10px rgba(255,0,0,0.4);
    }

    .btn-icon:active {
        background: var(--accent);
        color: #000;
    }
</style>
</head>
<body>

    <div class="header">
        <div class="brand-line">MICROJOY BY ALIMIN <span class="ver-tag">V1</span></div>
        <div class="status-container">
            <span id="status">Offline</span>
            <button class="btn-connect" id="btnConnect">Connect</button>
        </div>
    </div>

    <div class="control-grid">
        <div class="telemetry-hud offline" id="telemetryOut">AWAITING</div>
        
        <div class="left-thumb-zone">
            <div class="joystick-hitbox" id="joystickHitbox">
                <div class="joystick-base" id="joystickBase">
                    <div class="thumbstick" id="thumbstick"></div>
                </div>
            </div>
            <div class="dpad-zone" id="dpadZone">
                <div class="dpad-btn dpad-up" id="btnUp">▲</div>
                <div class="dpad-btn dpad-right" id="btnRight">▶</div>
                <div class="dpad-btn dpad-down" id="btnDown">▼</div>
                <div class="dpad-btn dpad-left" id="btnLeft">◀</div>
            </div>
        </div>

        <div class="action-column">
            <div class="btn-action" id="btnA">A</div>
            <div class="btn-action" id="btnB">B</div>
        </div>
    </div>

    <div class="bottom-right-cluster">
        <button class="btn-icon" id="btnToggleMode">✜</button>
        <button class="btn-icon" id="btnFullscreen">⛶</button>
    </div>

    <script>
        // --- HAPTIC ENGINE ---
        function triggerHaptic(ms) { if (navigator.vibrate) { navigator.vibrate(ms); } }

        // --- MODE TOGGLE & FULLSCREEN ---
        let isDpadMode = false;
        const btnToggle = document.getElementById('btnToggleMode');
        const joyHitbox = document.getElementById('joystickHitbox');
        const dpZone = document.getElementById('dpadZone');

        btnToggle.addEventListener('click', () => {
            isDpadMode = !isDpadMode;
            triggerHaptic(15);
            if (isDpadMode) {
                joyHitbox.style.display = 'none'; dpZone.style.display = 'block'; btnToggle.innerHTML = '⨀'; 
            } else {
                joyHitbox.style.display = 'block'; dpZone.style.display = 'none'; btnToggle.innerHTML = '✜'; 
            }
            cX = 0; cY = 0; forceKineticUpdate();
        });

        const btnFs = document.getElementById('btnFullscreen');
        btnFs.addEventListener('click', async () => {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                    if (screen.orientation && screen.orientation.lock) await screen.orientation.lock("landscape");
                    btnFs.innerHTML = "✖"; 
                } else {
                    await document.exitFullscreen();
                    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
                    btnFs.innerHTML = "⛶"; 
                }
            } catch (err) { alert("Browser blocked rotation."); }
        });

        // --- BLE CORE ---
        if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));

        const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_RX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
        let bleDevice, rxChar, isConnected = false;
        let cX = 0, cY = 0, lX, lY;

        const statusEl = document.getElementById('status'), telEl = document.getElementById('telemetryOut'), connBtn = document.getElementById('btnConnect');

        connBtn.addEventListener('click', async () => {
            if (bleDevice?.gatt.connected) { bleDevice.gatt.disconnect(); return; }
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: "BBC" }, { namePrefix: "micro:bit" }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                rxChar = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);
                isConnected = true; statusEl.innerText = "ONLINE"; statusEl.classList.add('connected');
                connBtn.innerText = "DISCONNECT"; telEl.classList.remove('offline');
                await send("mode_analog\n");
            } catch (e) { console.error(e); }
        });

        bleDevice?.addEventListener('gattserverdisconnected', () => {
            isConnected = false; statusEl.innerText = "OFFLINE"; statusEl.classList.remove('connected');
            connBtn.innerText = "CONNECT"; telEl.classList.add('offline'); telEl.innerText = "SEVERED";
        });

        async function send(s) {
            telEl.innerText = s.replace('\n','');
            if (!rxChar) return;
            try { await rxChar.writeValue(new TextEncoder().encode(s)); } catch (e) {}
        }

        const fFormat = (v) => (v>=0?'+':'-') + Math.abs(v).toString().padStart(2,'0');
        function forceKineticUpdate() {
            if (cX !== lX || cY !== lY) {
                send(`X${fFormat(cX)},Y${fFormat(cY)}\n`);
                lX = cX; lY = cY;
            }
        }

        // --- DYNAMIC JOYSTICK ENGINE (v1.1.9 CENTER DETENT) ---
        const base = document.getElementById('joystickBase'), thumb = document.getElementById('thumbstick');
        let activePointerId = null, originX = 0, originY = 0, currentMaxRadius = 80;
        let edgeHitLock = false; 
        let wasReversing = false; // Tracks if the chassis is currently in the lower hemisphere

        joyHitbox.addEventListener('pointerdown', (e) => {
            if (activePointerId !== null) return;
            activePointerId = e.pointerId; joyHitbox.setPointerCapture(activePointerId);
            triggerHaptic(20); base.classList.add('active');
            const hRect = joyHitbox.getBoundingClientRect();
            originX = e.clientX - hRect.left; originY = e.clientY - hRect.top;
            base.style.left = `${originX}px`; base.style.top = `${originY}px`;
            thumb.style.transform = `translate(-50%, -50%)`; 
            cX = 0; cY = 0; edgeHitLock = false; wasReversing = false; 
            currentMaxRadius = base.getBoundingClientRect().width / 2;
            forceKineticUpdate();
        });

        joyHitbox.addEventListener('pointermove', (e) => {
            if (activePointerId !== e.pointerId) return;
            const hRect = joyHitbox.getBoundingClientRect();
            let dx = (e.clientX - hRect.left) - originX, dy = (e.clientY - hRect.top) - originY;
            const dist = Math.hypot(dx, dy);
            
            if (dist >= currentMaxRadius) {
                dx *= currentMaxRadius / dist; dy *= currentMaxRadius / dist;
                if (!edgeHitLock) { triggerHaptic(30); base.classList.add('max-throttle'); edgeHitLock = true; }
            } else if (dist < currentMaxRadius * 0.85) {
                if (edgeHitLock) { base.classList.remove('max-throttle'); edgeHitLock = false; }
            }
            
            thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            cX = Math.round((dx / currentMaxRadius) * 90); 
            cY = Math.round((-dy / currentMaxRadius) * 90);

            // --- CENTER CROSSING DETENT LOGIC ---
            // If pulling back past the -5 buffer, and we weren't reversing before
            if (cY < -5 && !wasReversing) {
                triggerHaptic(15); 
                wasReversing = true;
            } 
            // If pushing forward past the +5 buffer, and we were reversing before
            else if (cY > 5 && wasReversing) {
                triggerHaptic(15); 
                wasReversing = false;
            }
        });

        function resetJoystick(e) {
            if (activePointerId !== e.pointerId) return;
            activePointerId = null; base.classList.remove('active', 'max-throttle');
            base.style.left = `50%`; base.style.top = `50%`;
            thumb.style.transform = `translate(-50%, -50%)`; 
            cX = 0; cY = 0; edgeHitLock = false; wasReversing = false;
            forceKineticUpdate();
        }

        joyHitbox.addEventListener('pointerup', resetJoystick); joyHitbox.addEventListener('pointercancel', resetJoystick);

        // --- D-PAD ENGINE ---
        const bindDpad = (id, axis, val) => {
            const el = document.getElementById(id); let pid = null;
            el.addEventListener('pointerdown', (e) => {
                if (pid !== null) return; pid = e.pointerId; el.setPointerCapture(pid);
                triggerHaptic(15); el.classList.add('active-toggle');
                if (axis === 'x') cX = val; if (axis === 'y') cY = val;
                forceKineticUpdate(); 
            });
            function release(e) {
                if (pid !== e.pointerId) return; pid = null; el.classList.remove('active-toggle');
                if (axis === 'x') cX = 0; if (axis === 'y') cY = 0;
                forceKineticUpdate(); 
            }
            el.addEventListener('pointerup', release); el.addEventListener('pointercancel', release);
        };
        bindDpad('btnUp', 'y', 90); bindDpad('btnDown', 'y', -90);
        bindDpad('btnLeft', 'x', -90); bindDpad('btnRight', 'x', 90);

        // --- ACTION BUTTONS ---
        const bindBtn = (id, char) => {
            const el = document.getElementById(id); let pid = null;
            el.addEventListener('pointerdown', (e) => { 
                if (pid !== null) return; pid = e.pointerId; el.setPointerCapture(pid);
                triggerHaptic(15); send(char.toUpperCase() + "\n"); el.classList.add('active-toggle'); 
            });
            function release(e) {
                if (pid !== e.pointerId) return; pid = null;
                send(char.toLowerCase() + "\n"); el.classList.remove('active-toggle');
            }
            el.addEventListener('pointerup', release); el.addEventListener('pointercancel', release);
        };
        bindBtn('btnA', 'a'); bindBtn('btnB', 'b');

        setInterval(forceKineticUpdate, 50);
    </script>
</body>
</html>
