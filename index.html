<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotionBit Controller</title>

<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}

.joy {
  width: 220px;
  height: 220px;
  background: #1e293b;
  border-radius: 50%;
  margin: 30px auto;
  position: relative;
}

.stick {
  width: 90px;
  height: 90px;
  background: #38bdf8;
  border-radius: 50%;
  position: absolute;
  top: 65px;
  left: 65px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>🤖 MotionBit Control</h2>

<button onclick="connect()">Connect</button>
<button onclick="send('mode_analog')">Analog</button>
<button onclick="send('mode_dpad')">D-Pad</button>

<div class="joy" id="joy">
  <div class="stick" id="stick"></div>
</div>

<button onclick="send('A')">A</button>
<button onclick="send('B')">B</button>

<script>
let char;

// CONNECT
async function connect() {
  let device = await navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: "BBC micro:bit" }],
    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
  });

  let server = await device.gatt.connect();
  let service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
  char = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');

  alert("Connected!");
}

// SEND
function send(data) {
  if (!char) return;
  char.writeValue(new TextEncoder().encode(data + "\n"));
}

// FORMAT NUMBER → +05 / -72
function format(val) {
  val = Math.round(val);
  let sign = val >= 0 ? "+" : "-";
  let num = Math.abs(val).toString().padStart(2, "0");
  return sign + num;
}

// JOYSTICK
let joy = document.getElementById("joy");
let stick = document.getElementById("stick");

let center = {x:110, y:110};
let max = 80;

joy.addEventListener("touchmove", e => {
  let rect = joy.getBoundingClientRect();

  let x = e.touches[0].clientX - rect.left;
  let y = e.touches[0].clientY - rect.top;

  let dx = x - center.x;
  let dy = y - center.y;

  dx = Math.max(-max, Math.min(max, dx));
  dy = Math.max(-max, Math.min(max, dy));

  stick.style.left = (dx + 65) + "px";
  stick.style.top = (dy + 65) + "px";

  // scale -100 to 100
  let X = dx / max * 100;
  let Y = -dy / max * 100;

  let msg = "X" + format(X) + ",Y" + format(Y);

  send(msg);
});

joy.addEventListener("touchend", () => {
  stick.style.left = "65px";
  stick.style.top = "65px";

  send("X+00,Y+00");
});
</script>

</body>
</html>
