<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MICROJOY v1</title>

<style>
:root {
    --bg-color: #0a0a0a;
    --panel-bg: #1a1a1a;
    --accent: #ff7a00;
    --accent-dim: #5a2d00;
    --danger: #ff0000;
    --text-main: #f5f5f5;
}

* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
}

html, body {
    margin: 0;
    width: 100%;
    height: 100dvh;
    background-color: var(--bg-color);
    color: var(--text-main);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 12px 15px;
    background: var(--panel-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 0 20px rgba(255,122,0,0.2);
}

.brand-line {
    font-weight: bold;
    color: var(--accent);
}

.ver-tag {
    font-size: 0.7rem;
    opacity: 0.5;
}

#status {
    font-size: 0.7rem;
    color: var(--danger);
    font-weight: bold;
}

#status.connected {
    color: var(--accent);
}

.btn-connect {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 12px;
}

/* GRID */
.control-grid {
    flex: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
}

/* TELEMETRY */
.telemetry-hud {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #000;
    padding: 10px 20px;
    border-radius: 20px;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
}

/* JOYSTICK */
.left-thumb-zone {
    width: 40%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.joystick-base {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    position: relative;
    box-shadow: 0 0 25px rgba(255,122,0,0.3);
}

.thumbstick {
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, #ff7a00, #5a2d00);
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* DPAD */
.dpad-zone {
    display: none;
}

.dpad-btn {
    background: #222;
    border: 2px solid var(--accent);
    color: var(--accent);
    width: 60px;
    height: 60px;
    border-radius: 10px;
}

/* ACTION BUTTON */
.action-column {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.btn-action {
    width: 110px;
    height: 65px;
    background: #222;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-size: 1.5rem;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(255,122,0,0.3);
}

.btn-action:active {
    background: var(--accent);
    color: #000;
}

/* ICON BUTTON */
.bottom-right-cluster {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
}

.btn-icon {
    width: 50px;
    height: 50px;
    background: #111;
    border: 1px solid var(--accent);
    color: var(--accent);
}
</style>
</head>

<body>

<div class="header">
    <div class="brand-line">XINEJOY ORANGE <span class="ver-tag">v1.1.10</span></div>
    <div>
        <span id="status">OFFLINE</span>
        <button class="btn-connect" id="btnConnect">CONNECT</button>
    </div>
</div>

<div class="control-grid">

    <div class="telemetry-hud" id="telemetryOut">AWAITING</div>

    <div class="left-thumb-zone">
        <div class="joystick-base" id="joystickBase">
            <div class="thumbstick" id="thumbstick"></div>
        </div>
    </div>

    <div class="action-column">
        <div class="btn-action" id="btnA">A</div>
        <div class="btn-action" id="btnB">B</div>
    </div>

</div>

<div class="bottom-right-cluster">
    <button class="btn-icon" id="btnToggleMode">✜</button>
    <button class="btn-icon" id="btnFullscreen">⛶</button>
</div>

<script>
// BLE SAME ASAL
const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const UART_RX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

let bleDevice, rxChar;

document.getElementById("btnConnect").onclick = async () => {
    try {
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "BBC" }, { namePrefix: "micro:bit" }],
            optionalServices: [UART_SERVICE_UUID]
        });

        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(UART_SERVICE_UUID);
        rxChar = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);

        document.getElementById("status").innerText = "ONLINE";
        document.getElementById("status").classList.add("connected");

    } catch(e) {
        console.log(e);
    }
};
</script>

</body>
</html>
