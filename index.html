<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Pro X</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}

h2 { margin: 10px; }

#connect {
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
}

.joy {
  width: 220px;
  height: 220px;
  background: #1e293b;
  border-radius: 50%;
  margin: 30px auto;
  position: relative;
}

.stick {
  width: 90px;
  height: 90px;
  background: #38bdf8;
  border-radius: 50%;
  position: absolute;
  top: 65px;
  left: 65px;
}

.btn {
  width: 100px;
  height: 60px;
  margin: 10px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
}

#A { background: red; }
#B { background: orange; }
</style>
</head>

<body>

<h2>🤖 Robot X Control</h2>
<button id="connect">Connect</button>

<div class="joy" id="joy">
  <div class="stick" id="stick"></div>
</div>

<button class="btn" id="A">A</button>
<button class="btn" id="B">B</button>

<script>
let char;

// CONNECT
document.getElementById("connect").onclick = async () => {
  let device = await navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: "BBC micro:bit" }],
    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
  });

  let server = await device.gatt.connect();
  let service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
  char = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');

  alert("Connected!");
};

function send(data) {
  if (!char) return;
  char.writeValue(new TextEncoder().encode(data + "\n"));
}

// BUTTON
A.ontouchstart = () => send("A");
B.ontouchstart = () => send("B");

// JOYSTICK
let joy = document.getElementById("joy");
let stick = document.getElementById("stick");

let center = {x:110, y:110};
let max = 80;

joy.addEventListener("touchmove", e => {
  let rect = joy.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left;
  let y = e.touches[0].clientY - rect.top;

  let dx = x - center.x;
  let dy = y - center.y;

  dx = Math.max(-max, Math.min(max, dx));
  dy = Math.max(-max, Math.min(max, dy));

  stick.style.left = (dx + 65) + "px";
  stick.style.top = (dy + 65) + "px";

  // normalize -100 to 100
  let X = dx / max * 100;
  let Y = -dy / max * 100;

  // TANK DRIVE CALC
  let left = Y + X;
  let right = Y - X;

  left = Math.max(-100, Math.min(100, left));
  right = Math.max(-100, Math.min(100, right));

  send(`L:${Math.round(left)},R:${Math.round(right)}`);
});

joy.addEventListener("touchend", () => {
  stick.style.left = "65px";
  stick.style.top = "65px";
  send("L:0,R:0");
});
</script>

</body>
</html>
