<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MICROJOY</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050000">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --bg-color: #050000;
            --panel-bg: #0d0000;
            --accent: #ff1a1a;
            --accent-dim: #4d0000;
            --danger: #ff0000;
            --text-main: #f5f5f5;
        }

        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; user-select: none; -webkit-user-select: none; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh;
            background: radial-gradient(circle at center, #0a0000 0%, #000000 100%);
            color: var(--text-main);
            overflow: hidden;
            touch-action: none;
            display: flex; flex-direction: column;
        }

        /* HEADER */
        .header {
            padding: 12px 15px;
            background: linear-gradient(90deg, #0d0000, #1a0000);
            border-bottom: 1px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .brand-line { 
            font-weight: bold; 
            color: var(--accent); 
            letter-spacing: 2px; 
            text-shadow: 0 0 8px var(--accent);
        }

        .ver-tag { color: #ffffff; font-size: 0.6rem; opacity: 0.5; margin-left: 6px; }

        .status-container { display: flex; align-items: center; gap: 10px; }
        #status { font-size: 0.7rem; color: var(--danger); text-transform: uppercase; font-weight: bold; }
        #status.connected { color: var(--accent); text-shadow: 0 0 6px var(--accent); }

        .btn-connect {
            background: rgba(255, 0, 0, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 7px 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,0,0,0.3);
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        /* CONTROL GRID */
        .control-grid {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px;
            padding: 20px; padding-top: 8vh; padding-bottom: 5vh; 
            position: relative;
        }

        .telemetry-hud {
            background: #000;
            border: 1px solid var(--accent);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
            text-align: center;
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
            z-index: 10;
        }
        .telemetry-hud.offline { color: #444; border-color: #222; box-shadow: none; }

        /* JOYSTICK */
        .joystick-base {
            width: 180px; height: 180px;
            background: rgba(20, 0, 0, 0.6);
            border: 2px solid rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            backdrop-filter: blur(4px);
        }

        .joystick-base.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        .joystick-base.max-throttle {
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255,0,0,0.8);
        }

        .thumbstick {
            width: 65px; height: 65px;
            background: radial-gradient(circle, #ff1a1a 0%, #800000 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 15px rgba(255,0,0,0.7);
        }

        /* D-PAD */
        .dpad-zone {
            width: 190px; height: 190px; position: absolute; display: none;
        }

        .dpad-btn {
            position: absolute;
            width: 65px; height: 65px;
            border-radius: 12px;
            background: rgba(40, 0, 0, 0.8);
            border: 2px solid rgba(255, 0, 0, 0.4);
            color: var(--accent);
            font-size: 1.8rem;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 10px rgba(255,0,0,0.3);
        }

        .dpad-btn.active-toggle {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        /* ACTION BUTTON */
        .btn-action {
            width: 110px; height: 65px;
            border-radius: 15px;
            background: rgba(40, 0, 0, 0.8);
            border: 2px solid rgba(255, 0, 0, 0.4);
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
        }

        .btn-action.active-toggle {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }

        /* ICON */
        .btn-icon {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            box-shadow: 0 0 10px rgba(255,0,0,0.4);
        }

        .btn-icon:active {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>
